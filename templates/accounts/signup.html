{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up | StockNova AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="auth-page d-flex align-items-center justify-content-center">
<div class="auth-card p-4 p-md-5">
    <h1 class="mb-1">Create account</h1>
    <p class="text-secondary mb-4">Join StockNova AI and start managing inventory smarter.</p>

    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors|striptags }}</div>{% endif %}
        </div>
        {% endfor %}
        <button class="btn btn-primary w-100 rounded-pill">Create Account</button>
    </form>
    <p class="small mt-3 mb-0 text-secondary">Already have an account? <a href="{% url 'accounts:login' %}">Login</a></p>
</div>
</body>
</html>
