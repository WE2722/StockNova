{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | StockNova AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="auth-page d-flex align-items-center justify-content-center">
<div class="auth-card p-4 p-md-5">
    <h1 class="mb-1">StockNova AI</h1>
    <p class="text-secondary mb-4">Professional inventory intelligence platform.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>
        <button class="btn btn-primary w-100">Sign in</button>
    </form>
</div>
</body>
</html>
