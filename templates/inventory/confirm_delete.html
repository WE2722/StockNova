{% extends 'base/base.html' %}

{% block title %}Confirm Delete | StockNova AI{% endblock %}

{% block content %}
<div class="panel-card col-lg-5 mx-auto">
    <h3>Confirm deletion</h3>
    <p>Are you sure you want to delete this {{ type }}: <strong>{{ object }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Delete</button>
        <a class="btn btn-outline-secondary" href="javascript:history.back()">Cancel</a>
    </form>
</div>
{% endblock %}
