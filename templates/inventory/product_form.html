{% extends 'base/base.html' %}

{% block title %}{{ title }} | StockNova AI{% endblock %}

{% block content %}
<div class="panel-card col-lg-8 mx-auto">
    <h3 class="mb-3">{{ title }}</h3>
    <form method="post" enctype="multipart/form-data" class="row g-3">
        {% csrf_token %}
        {% for field in form %}
        <div class="col-md-6">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">Save</button>
            <a href="{% url 'inventory:product_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
